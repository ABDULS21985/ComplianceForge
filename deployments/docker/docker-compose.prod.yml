version: "3.9"

services:
  api:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.api
    image: complianceforge-api:latest
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgres://complianceforge:${DB_PASSWORD}@postgres:5432/complianceforge?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - complianceforge

  worker:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile.api
    image: complianceforge-api:latest
    command: ["/app/worker"]
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgres://complianceforge:${DB_PASSWORD}@postgres:5432/complianceforge?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - complianceforge

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployments/docker/Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
    image: complianceforge-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api/v1}
    restart: unless-stopped
    networks:
      - complianceforge

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=complianceforge
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=complianceforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complianceforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - complianceforge

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - complianceforge

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_PATH:-./certs/cert.pem}:/etc/nginx/ssl/cert.pem:ro
      - ${TLS_KEY_PATH:-./certs/key.pem}:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - complianceforge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  complianceforge:
    driver: bridge
